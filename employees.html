<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendease Employees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/dashboard.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bir-blue': '#003087',
                        'bir-yellow': '#FDB913',
                        'bir-red': '#ED1C24',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-100 font-sans">
    <!-- Sidebar -->
    <aside class="sidebar bg-bir-blue text-white">
        <div class="p-4 flex justify-center items-center">
            <h1 class="text-xl pt-2 font-bold text-center">Attendease</h1>
        </div>
        <nav class="mt-1">
            <div class="px-4 py-2 text-xs uppercase text-bir-yellow">Menu</div>
            <a href="dashboard.html" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                Dashboard
            </a>
            <a href="#" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue active flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path>
                </svg>
                Employees
            </a>
            <a href="#" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M6.625 2.655A9 9 0 0119 11a1 1 0 11-2 0 7 7 0 00-9.625-6.492 1 1 0 11-.75-1.853zM4.662 4.959A1 1 0 014.75 6.37 6.97 6.97 0 003 11a1 1 0 11-2 0 8.97 8.97 0 012.25-5.953 1 1 0 011.412-.088z" clip-rule="evenodd"></path>
                    <path fill-rule="evenodd" d="M5 11a5 5 0 1110 0 1 1 0 11-2 0 3 3 0 10-6 0c0 1.677-.345 3.276-.968 4.729a1 1 0 11-1.838-.789A9.964 9.964 0 005 11zm8.921 2.012a1 1 0 01.831 1.145 19.86 19.86 0 01-.545 2.436 1 1 0 11-1.92-.558c.207-.713.371-1.445.49-2.192a1 1 0 011.144-.831z" clip-rule="evenodd"></path>
                </svg>
                Attendance
            </a>
            <a href="departments.html" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path>
                </svg>
                Departments
            </a>
            <div class="px-4 py-2 mt-6 text-xs uppercase text-bir-yellow">System</div>
            <a href="#" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.532 1.532 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path>
                </svg>
                Settings
            </a>
            <a href="#" id="logout-button" class="sidebar-link block py-2 px-4 text-gray-300 hover:bg-bir-yellow hover:text-bir-blue flex items-center">
                <svg class="w-5 h-5 mr-3" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"></path>
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <!-- Main wrapper -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="header bg-bir-blue text-white p-8 flex justify-between items-center shadow-sm">
            <button class="text-gray-600 hover:text-gray-900 sm:hidden">
                <i class="fas fa-bars"></i>
            </button>
            <button class="text-gray-600 hover:text-gray-900">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <!-- Main content -->
        <main class="main-content bg-white p-6 pt-11">
            <div class="flex items-center ml-6 mb-8 dashboard-title">
                <div class="flex pt-1 items-center text-sm text-gray-600 font-semibold">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gray-600">
                        <path d="M1 6V15H6V11C6 9.89543 6.89543 9 8 9C9.10457 9 10 9.89543 10 11V15H15V6L8 0L1 6Z" fill="currentColor"/>
                    </svg>
                    <span class="flex items-center">
                        <span class="mx-2">/</span>
                        <span class="flex items-center">Employees</span>
                    </span>
                </div>
            </div>

            <!-- Employees Table -->
            <div class="bg-white rounded-lg p-6 dashboard-card">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-lg font-bold text-gray-800">Employee List</h4>
                </div>
                <div class="mb-4 flex items-center">
                    <label for="sortBy" class="mr-2 text-sm font-semibold text-gray-700">Sort by:</label>
                    <select id="sortBy" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs font-semibold rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
                        <option value="employee_id">Employee ID</option>
                        <option value="name">Name</option>
                        <option value="department">Department</option>
                    </select>
                    <button id="sortDirection" class="ml-2 px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-100">
                        ↑
                    </button>
                    <button type="button" id="addEmployeeBtn" class="ml-auto text-bir-blue text-xs bg-bir-yellow font-small font-semibold rounded-lg text-sm p-3 hover:bg-bir-blue hover:text-bir-yellow">Add Employee</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white">
                        <thead>
                            <tr class="bg-bir-blue text-white">
                                <th class="text-xs font-bold py-3 px-4 text-left border-b border-r-2 border-white">Employee ID</th>
                                <th class="text-xs font-bold py-3 px-4 text-left border-b border-r-2 border-white">Fullname</th>
                                <th class="text-xs font-bold py-3 px-4 text-left border-b border-r-2 border-white">Department</th>
                                <th class="text-xs font-bold py-3 px-4 text-left border-b border-r-2 border-white">Email</th>
                                <th class="text-xs font-bold py-3 px-4 text-left border-b border-white">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="employeesTableBody">
                            <!-- Table rows will be dynamically inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add this modal at the end of the body, just before the closing </body> tag -->
    <div id="addEmployeeModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden flex items-center justify-center">
        <div class="relative p-8 border w-[500px] shadow-lg rounded-md bg-white">
            <h3 class="text-xl font-bold text-gray-900 mb-6">Add New Employee</h3>
            <form id="addEmployeeForm">
                <div class="mb-5">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" name="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                </div>
                <div class="mb-5">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                </div>
                <div class="mb-5">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                </div>
                <div class="mb-5">
                    <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
                    <select id="gender" name="gender" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
                <div class="mb-5">
                    <label for="department_id" class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    <select id="department_id" name="department_id" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                        <option value="">Select Department</option>
                        <option value=1>HR</option>
                        <option value=2>IT</option>
                        <option value=3>General Services</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="shift_id" class="block text-sm font-medium text-gray-700 mb-1">Shifts</label>
                    <select id="shift_id" name="shift_id" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 p-2">
                        <option value="">Select Shift</option>
                        <option value="1">Regular</option>
                        <option value="2">Early Morning</option>
                        <option value="3">Midday</option>
                    </select>
                </div>
                <div class="flex justify-end">
                    <button type="button" id="cancelAddEmployee" class="mr-3 px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-md hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">Cancel</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-bir-blue rounded-md hover:bg-bir-yellow hover:text-bir-blue focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-bir-blue">Add Employee</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmationModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden opacity-0 transition-opacity duration-300">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white transform transition-transform duration-300 scale-95">
            <div class="mt-3 text-center">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Delete Employee</h3>
                <div class="mt-2 px-7 py-3">
                    <p class="text-sm text-gray-500">
                        Are you sure you want to delete this employee?
                    </p>
                    <span id="employeeNameToDelete" class="font-semibold"></span>
                </div>
                <div class="items-center px-4 py-3">
                    <button id="deleteConfirmBtn" class="px-4 py-2 bg-bir-red text-white text-base font-medium rounded-md w-24 mr-2 hover:bg-red-600">
                        Delete
                    </button>
                    <button id="deleteCancelBtn" class="px-4 py-2 bg-gray-500 text-white text-base font-medium rounded-md w-24 hover:bg-gray-600">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

  <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 p-4 rounded-md shadow-lg hidden">
        <div id="toastContent" class="text-white font-semibold"></div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/employees.js"></script>
</body>
</html>
